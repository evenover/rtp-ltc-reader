<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Internal Clock</title>
<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.time {
  font-size:17vw;
}

.sync-indicator {
  position:fixed;
  top:12px;
  right:12px;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#0f0;
}
</style>
</head>
<body>

<div class="sync-indicator" id="sync"></div>
<div class="time" id="time">--:--:--</div>

<script>
const ws = new WebSocket("ws://" + location.host + "/clock");
const timeEl = document.getElementById("time");

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  timeEl.innerText = data.time;
};
</script>
</body>
</html>
