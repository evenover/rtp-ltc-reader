<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Setup</title>
<style>
body {
  margin: 0;
  background: #1a1a1a;
  color: #eee;
  font-family: monospace;
  display: flex;
  justify-content: center;
  padding: 1rem 1.5rem;
}

.container {
  width: 100%;
  max-width: 1100px;
}

h1 {
  font-size: 1.3rem;
  margin: 0 0 0.75rem 0;
}

.top-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 1.5rem;
}

.form-grid .span2 {
  grid-column: 1 / -1;
}

label {
  display: block;
  margin-top: 0.5rem;
  font-size: 0.8rem;
  opacity: 0.7;
}

input, select {
  width: 100%;
  padding: 0.3rem 0.4rem;
  margin-top: 0.15rem;
  background: #2a2a2a;
  border: 1px solid #444;
  color: #eee;
  font-family: monospace;
  font-size: 0.85rem;
  box-sizing: border-box;
}

.tz-wrapper {
  position: relative;
  margin-top: 0.15rem;
}

.tz-wrapper input {
  margin-top: 0;
}

.tz-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  max-height: 200px;
  overflow-y: auto;
  background: #2a2a2a;
  border: 1px solid #444;
  border-top: none;
  z-index: 10;
  box-sizing: border-box;
}

.tz-dropdown.open {
  display: block;
}

.tz-option {
  padding: 0.3rem 0.4rem;
  cursor: pointer;
  font-family: monospace;
  font-size: 0.85rem;
}

.tz-option:hover, .tz-option.active {
  background: #444;
}

.channel-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-top: 0.15rem;
}

.channel-row input {
  flex: 1;
}

.channel-row span {
  opacity: 0.5;
  font-size: 0.75rem;
  min-width: 1.5rem;
}

button {
  padding: 0.4rem 1.2rem;
  background: #0a0;
  color: #fff;
  border: none;
  font-family: monospace;
  font-size: 0.9rem;
  cursor: pointer;
}

button:hover {
  background: #0c0;
}

button.add-btn {
  background: #555;
  font-size: 0.8rem;
  padding: 0.3rem 0.6rem;
  margin-top: 0.3rem;
}

button.add-btn:hover {
  background: #777;
}

button.remove-btn {
  background: #a00;
  font-size: 0.75rem;
  padding: 0.2rem 0.4rem;
  margin: 0;
}

button.remove-btn:hover {
  background: #c00;
}

.msg {
  margin-top: 0.5rem;
  padding: 0.3rem;
  font-size: 0.85rem;
}

.msg.ok { color: #0f0; }
.msg.err { color: #f00; }

fieldset {
  border: 1px solid #444;
  padding: 0.5rem;
  margin-top: 0.5rem;
  margin-bottom: 0;
}

legend {
  font-size: 0.85rem;
  opacity: 0.8;
}

.panel {
  border: 1px solid #444;
  padding: 0.6rem;
  background: #222;
}

.panel h2 {
  margin: 0 0 0.4rem 0;
  font-size: 1rem;
}

.status-row {
  display: flex;
  justify-content: space-between;
  padding: 0.2rem 0;
  border-bottom: 1px solid #333;
  font-size: 0.8rem;
}

.status-row:last-child {
  border-bottom: none;
}

.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 0.3rem;
  vertical-align: middle;
}

.dot.green { background: #0f0; }
.dot.red { background: #f00; }
.dot.yellow { background: #ff0; }
.dot.grey { background: #666; }

.panel a {
  color: #4af;
  text-decoration: none;
}

.panel a:hover {
  text-decoration: underline;
}

.restart-btn {
  background: none;
  color: #aaa;
  border: none;
  font-size: 0.9rem;
  padding: 0;
  cursor: pointer;
  margin-left: 0.3rem;
  line-height: 1;
  vertical-align: middle;
}

.restart-btn:hover {
  color: #fff;
}

.restart-all-btn {
  background: #555;
  color: #fff;
  border: none;
  font-family: monospace;
  font-size: 0.8rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  margin-top: 0.4rem;
  display: block;
  width: 100%;
}

.restart-all-btn:hover {
  background: #777;
}

details.sdp-details {
  margin-top: 0.5rem;
}

details.sdp-details summary {
  cursor: pointer;
  font-size: 0.85rem;
  opacity: 0.8;
  margin-bottom: 0.3rem;
}

details.sdp-details textarea {
  width: 100%;
  min-height: 80px;
  padding: 0.4rem;
  background: #2a2a2a;
  border: 1px solid #444;
  color: #eee;
  font-family: monospace;
  font-size: 0.8rem;
  box-sizing: border-box;
  resize: vertical;
}

details.sdp-details button {
  margin-top: 0.3rem;
  background: #36a;
  font-size: 0.8rem;
  padding: 0.3rem 0.6rem;
}

details.sdp-details button:hover {
  background: #48c;
}

.sdp-msg {
  margin-top: 0.3rem;
  font-size: 0.75rem;
}

.sdp-msg.ok { color: #0f0; }
.sdp-msg.err { color: #f00; }

.bottom-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-top: 0.75rem;
}
</style>
</head>
<body>

<div class="container">
  <h1>Setup</h1>

  <div class="top-row">
    <div class="panel">
      <h2>Status</h2>
      <div class="status-row">
        <a href="/ptp" target="_blank">PTP</a>
        <span id="ptp-status"><span class="dot grey"></span>Connecting...</span>
      </div>
      <div class="status-row">
        <a href="/ntp" target="_blank">NTP</a>
        <span id="ntp-status"><span class="dot grey"></span>Connecting...</span>
      </div>
      <div class="status-row">
        <a href="/clock" target="_blank">Clock</a>
        <span id="clock-status"><span class="dot grey"></span>--:--:--</span>
      </div>
      <div id="channel-status"></div>
      <button class="restart-all-btn" onclick="restartAll()" title="Restart all channels">&#x21bb; Restart All</button>
    </div>

    <div class="panel">
      <h2>Internal Clock</h2>
      <div style="display:flex;gap:0.4rem;align-items:center">
        <input id="clock-time" type="time" step="1" style="flex:1">
        <button onclick="setClock()" style="background:#36a;white-space:nowrap;font-size:0.8rem;padding:0.3rem 0.5rem">Set</button>
        <button onclick="syncClockToSystem()" style="background:#555;white-space:nowrap;font-size:0.8rem;padding:0.3rem 0.5rem">System</button>
      </div>
      <div id="clock-current" style="margin-top:0.3rem;font-size:0.8rem;opacity:0.7">Current: --:--:--</div>
      <div id="clock-msg" class="sdp-msg"></div>
    </div>
  </div>

  <div class="form-grid">
    <div>
      <label>PTP Interface (IFACE)</label>
      <select id="iface"></select>
    </div>
    <div>
      <label>Multicast Interface (MCIFACE)</label>
      <select id="mciface"></select>
    </div>

    <div>
      <label>Source Multicast Address</label>
      <input id="sourcemulticast" type="text" placeholder="239.255.0.1">
    </div>
    <div>
      <label>Source IP (empty = no SSM)</label>
      <input id="sourceip" type="text" placeholder="10.151.5.226">
    </div>

    <div>
      <label>Multicast Port</label>
      <input id="mcport" type="number" placeholder="5004">
    </div>
    <div>
      <label>Encoding</label>
      <select id="encoding">
        <option value="L24">L24 (24-bit)</option>
        <option value="L16">L16 (16-bit)</option>
      </select>
    </div>

    <div>
      <label>Sample Rate (Hz)</label>
      <input id="samplerate" type="number" placeholder="48000">
    </div>
    <div>
      <label>Stream Size (channels in stream)</label>
      <input id="streamsize" type="number" min="1" max="64" placeholder="16">
    </div>

    <div>
      <label>PTP Domain (0–127)</label>
      <input id="domain" type="number" min="0" max="127" placeholder="0">
    </div>
    <div>
      <label>Leap Seconds Correction</label>
      <input id="leapseconds" type="number" min="-10" max="10" placeholder="0">
    </div>

    <div>
      <label>NTP Server</label>
      <input id="ntpserver" type="text" placeholder="e.g. pool.ntp.org">
    </div>
    <div>
      <label>Timezone</label>
      <div class="tz-wrapper">
        <input id="timezone" autocomplete="off" placeholder="Start typing...">
        <div id="tz-dropdown" class="tz-dropdown"></div>
      </div>
    </div>

    <div>
      <label>Decode Channels</label>
      <input id="channels" type="number" min="1" max="64" placeholder="16">
    </div>
    <div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:1.6rem">
        <input id="showframes" type="checkbox" style="width:auto"> Show frames
      </label>
    </div>

    <div class="span2">
      <fieldset>
        <legend>Channel Names</legend>
        <div id="channel-list"></div>
        <button class="add-btn" onclick="addChannel()">+ Add</button>
      </fieldset>
    </div>

    <div class="span2">
      <details class="sdp-details">
        <summary>Import from SDP</summary>
        <textarea id="sdp-input" placeholder="Paste SDP content here..."></textarea>
        <button onclick="importSdp()">Import</button>
        <div id="sdp-msg" class="sdp-msg"></div>
      </details>
    </div>
  </div>

  <div class="bottom-bar">
    <button onclick="save()">Save</button>
    <div id="msg" class="msg"></div>
  </div>
</div>

<script>
const timezones = Intl.supportedValuesOf('timeZone');
const tzInput = document.getElementById('timezone');
const tzDropdown = document.getElementById('tz-dropdown');

function renderTzOptions(filter) {
  const query = (filter || '').toLowerCase();
  const matches = query ? timezones.filter(tz => tz.toLowerCase().includes(query)) : timezones;
  tzDropdown.innerHTML = '';
  matches.slice(0, 50).forEach(tz => {
    const div = document.createElement('div');
    div.className = 'tz-option';
    div.textContent = tz;
    div.onmousedown = (e) => {
      e.preventDefault();
      tzInput.value = tz;
      tzDropdown.classList.remove('open');
    };
    tzDropdown.appendChild(div);
  });
}

tzInput.addEventListener('focus', () => {
  renderTzOptions(tzInput.value);
  tzDropdown.classList.add('open');
});

tzInput.addEventListener('input', () => {
  renderTzOptions(tzInput.value);
  tzDropdown.classList.add('open');
});

tzInput.addEventListener('blur', () => {
  tzDropdown.classList.remove('open');
});

function importSdp() {
  const sdp = document.getElementById('sdp-input').value;
  const msg = document.getElementById('sdp-msg');
  const fields = [];

  // Connection address: c=IN IP4 239.255.0.1/32
  const cMatch = sdp.match(/^c=IN\s+IP[46]\s+([\d.]+)/m);
  if (cMatch) {
    document.getElementById('sourcemulticast').value = cMatch[1];
    fields.push('Multicast Address');
  }

  // Media line: m=audio 5004 RTP/AVP 98
  const mMatch = sdp.match(/^m=audio\s+(\d+)\s+/m);
  if (mMatch) {
    document.getElementById('mcport').value = mMatch[1];
    fields.push('Port');
  }

  // rtpmap: a=rtpmap:98 L24/48000/4
  const rtpMatch = sdp.match(/^a=rtpmap:\d+\s+([A-Za-z0-9]+)\/(\d+)(?:\/(\d+))?/m);
  if (rtpMatch) {
    document.getElementById('encoding').value = rtpMatch[1];
    fields.push('Encoding');
    document.getElementById('samplerate').value = rtpMatch[2];
    fields.push('Sample Rate');
    if (rtpMatch[3]) {
      document.getElementById('streamsize').value = rtpMatch[3];
      fields.push('Stream Size');
    }
  }

  // Source filter: a=source-filter: incl IN IP4 239.254.151.10 10.151.5.226
  const sfMatch = sdp.match(/^a=source-filter:\s*incl\s+IN\s+IP[46]\s+\S+\s+([\d.]+)/m);
  if (sfMatch) {
    document.getElementById('sourceip').value = sfMatch[1];
    fields.push('Source IP');
  }

  if (fields.length > 0) {
    msg.className = 'sdp-msg ok';
    msg.textContent = 'Imported: ' + fields.join(', ');
  } else {
    msg.className = 'sdp-msg err';
    msg.textContent = 'Could not parse any stream details from SDP';
  }
}

async function loadInterfaces() {
  const res = await fetch('/api/interfaces');
  const ifaces = await res.json();

  [document.getElementById('iface'), document.getElementById('mciface')].forEach(sel => {
    sel.innerHTML = '';
    ifaces.forEach(i => {
      const opt = document.createElement('option');
      opt.value = i.address;
      opt.textContent = `${i.name} — ${i.address}`;
      sel.appendChild(opt);
    });
  });

  return ifaces;
}

function renderChannels(channelInfo) {
  const list = document.getElementById('channel-list');
  list.innerHTML = '';
  channelInfo.forEach((ch, i) => {
    const row = document.createElement('div');
    row.className = 'channel-row';
    row.innerHTML = `<span>${i + 1}</span><input type="text" value="${ch.name}" data-ch="${i}"><button class="remove-btn" onclick="removeChannel(${i})">✕</button>`;
    list.appendChild(row);
  });
}

function addChannel() {
  const list = document.getElementById('channel-list');
  const idx = list.children.length;
  const row = document.createElement('div');
  row.className = 'channel-row';
  row.innerHTML = `<span>${idx + 1}</span><input type="text" value="Channel ${idx + 1}" data-ch="${idx}"><button class="remove-btn" onclick="removeChannel(${idx})">✕</button>`;
  list.appendChild(row);
  document.getElementById('channels').value = list.children.length;
}

function removeChannel(idx) {
  const list = document.getElementById('channel-list');
  const inputs = list.querySelectorAll('input');
  const names = Array.from(inputs).map(i => ({ name: i.value }));
  names.splice(idx, 1);
  renderChannels(names);
  document.getElementById('channels').value = names.length;
}

async function load() {
  await loadInterfaces();

  const res = await fetch('/api/config');
  const cfg = await res.json();

  document.getElementById('iface').value = cfg.IFACE || '';
  document.getElementById('mciface').value = cfg.MCIFACE || cfg.IFACE || '';
  document.getElementById('sourcemulticast').value = cfg.SOURCEMULTICAST || '';
  document.getElementById('sourceip').value = cfg.SOURCEIP || '';
  document.getElementById('mcport').value = cfg.MCPORT || '';
  document.getElementById('encoding').value = cfg.ENCODING || 'L24';
  document.getElementById('samplerate').value = cfg.SAMPLERATE || 48000;
  document.getElementById('streamsize').value = cfg.STREAMSIZE || 16;
  document.getElementById('domain').value = cfg.DOMAIN ?? 0;
  document.getElementById('leapseconds').value = cfg.LEAPSECONDS ?? 0;
  document.getElementById('ntpserver').value = cfg.NTPSERVER || '';
  document.getElementById('timezone').value = cfg.TIMEZONE || 'UTC';
  document.getElementById('channels').value = cfg.DECODECHANNELS || 1;
  document.getElementById('showframes').checked = cfg.SHOWFRAMES !== false;

  renderChannels(cfg.CHANNEL_INFO || []);
}

async function save() {
  const channelInputs = document.querySelectorAll('#channel-list input');
  const channelInfo = Array.from(channelInputs).map(i => ({ name: i.value }));

  const currentCfg = await (await fetch('/api/config')).json();

  const cfg = {
    IFACE: document.getElementById('iface').value,
    PORT: currentCfg.PORT,
    MCIFACE: document.getElementById('mciface').value,
    SOURCEMULTICAST: document.getElementById('sourcemulticast').value,
    MCPORT: parseInt(document.getElementById('mcport').value),
    STREAMSIZE: parseInt(document.getElementById('streamsize').value),
    ENCODING: document.getElementById('encoding').value,
    SAMPLERATE: parseInt(document.getElementById('samplerate').value),
    SOURCEIP: document.getElementById('sourceip').value,
    TIMEZONE: document.getElementById('timezone').value,
    DOMAIN: parseInt(document.getElementById('domain').value),
    LEAPSECONDS: parseInt(document.getElementById('leapseconds').value) || 0,
    NTPSERVER: document.getElementById('ntpserver').value,
    DECODECHANNELS: parseInt(document.getElementById('channels').value),
    SHOWFRAMES: document.getElementById('showframes').checked,
    CHANNEL_INFO: channelInfo
  };

  const res = await fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg)
  });

  const result = await res.json();
  const msg = document.getElementById('msg');
  if (result.ok) {
    msg.className = 'msg ok';
    msg.textContent = 'Config saved. Restarting server...';
    waitForRestart();
  } else {
    msg.className = 'msg err';
    msg.textContent = 'Save failed';
  }
}

function waitForRestart() {
  const msg = document.getElementById('msg');
  let attempts = 0;
  const check = setInterval(async () => {
    attempts++;
    try {
      const res = await fetch('/api/config');
      if (res.ok) {
        clearInterval(check);
        msg.textContent = 'Server restarted. Reloading...';
        setTimeout(() => location.reload(), 500);
      }
    } catch (e) {
      if (attempts > 30) {
        clearInterval(check);
        msg.className = 'msg err';
        msg.textContent = 'Server did not come back. Check manually.';
      }
    }
  }, 1000);
}

async function restartChannel(ch) {
  await fetch('/api/restart/' + ch, { method: 'POST' });
}

async function restartAll() {
  await fetch('/api/restart', { method: 'POST' });
}

function connectStatus() {
  const ws = new WebSocket('ws://' + location.host + '/status');

  ws.onmessage = (e) => {
    const status = JSON.parse(e.data);

    const ptpEl = document.getElementById('ptp-status');
    if (status.ptp.synced) {
      ptpEl.innerHTML = `<span class="dot green"></span>Synced — Master: ${status.ptp.master}`;
    } else {
      ptpEl.innerHTML = '<span class="dot red"></span>Not synced';
    }

    const ntpEl = document.getElementById('ntp-status');
    if (status.ntp.server) {
      if (status.ntp.synced) {
        ntpEl.innerHTML = `<span class="dot green"></span>Synced — ${status.ntp.server}`;
      } else {
        ntpEl.innerHTML = `<span class="dot red"></span>Querying ${status.ntp.server}...`;
      }
    } else {
      ntpEl.innerHTML = '<span class="dot grey"></span>No server configured';
    }

    const chEl = document.getElementById('channel-status');
    chEl.innerHTML = '';

    status.channels.forEach(ch => {
      let dotClass, label;
      if (ch.pipeline === 'decoding' && ch.receiving) {
        dotClass = 'green';
        label = `Decoding — ${ch.tc}`;
      } else if (ch.pipeline === 'running') {
        dotClass = 'yellow';
        label = 'Running (no LTC)';
      } else if (ch.pipeline === 'starting') {
        dotClass = 'yellow';
        label = 'Starting...';
      } else if (ch.pipeline === 'error') {
        dotClass = 'red';
        label = 'Error';
      } else if (ch.pipeline === 'failed') {
        dotClass = 'red';
        label = `Failed (${ch.restarts}/${ch.maxRestarts} restarts)`;
      } else {
        dotClass = 'grey';
        label = 'Stopped';
      }

      chEl.innerHTML += `<div class="status-row"><span><a href="/channel-${ch.channel}" target="_blank">Ch ${ch.channel}: ${ch.name}</a></span><span><span class="dot ${dotClass}"></span>${label}<button class="restart-btn" onclick="restartChannel(${ch.channel})" title="Restart channel ${ch.channel}">&#x21bb;</button></span></div>`;
    });
  };

  ws.onclose = () => {
    document.getElementById('ptp-status').innerHTML = '<span class="dot red"></span>Offline';
    setTimeout(connectStatus, 2000);
  };
}

async function setClock() {
  const val = document.getElementById('clock-time').value;
  const msg = document.getElementById('clock-msg');
  if (!val) { msg.className = 'sdp-msg err'; msg.textContent = 'Enter a time first'; return; }
  const res = await fetch('/api/setclock', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ time: val })
  });
  const data = await res.json();
  if (data.ok) {
    msg.className = 'sdp-msg ok';
    msg.textContent = 'Clock set to ' + val;
  } else {
    msg.className = 'sdp-msg err';
    msg.textContent = data.error || 'Failed to set clock';
  }
}

async function syncClockToSystem() {
  const msg = document.getElementById('clock-msg');
  const res = await fetch('/api/setclock', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ time: null })
  });
  const data = await res.json();
  if (data.ok) {
    msg.className = 'sdp-msg ok';
    msg.textContent = 'Clock synced to system time';
  }
}

function pollClock() {
  setInterval(async () => {
    try {
      const res = await fetch('/api/clock');
      const data = await res.json();
      document.getElementById('clock-current').textContent = 'Current: ' + data.time;
      const statusEl = document.getElementById('clock-status');
      const offsetLabel = data.offset === 0 ? 'System time' : `Offset: ${(data.offset / 1000).toFixed(1)}s`;
      statusEl.innerHTML = `<span class="dot green"></span>${data.time} (${offsetLabel})`;
    } catch(e) {}
  }, 500);
}

load();
connectStatus();
pollClock();
</script>
</body>
</html>
