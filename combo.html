<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Combo Clock</title>
<style>
html, body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  height:100vh;
  overflow:hidden;
}

#grid {
  display:grid;
  height:100vh;
  width:100vw;
  place-items:center;
}

.clock {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  width:100%;
  height:100%;
}

.label {
  font-size:5rem;
  opacity:0.7;
  display:flex;
  align-items:center;
  gap:0.5em;
  white-space:nowrap;
}

.sync-ball {
  display:inline-block;
  width:0.8em;
  height:0.8em;
  border-radius:50%;
  background:#f00;
}

.sync-ball.synced {
  background:#0f0;
}

.sync-ball.hidden {
  display:none;
}

.time {
  white-space:nowrap;
}
</style>
</head>
<body>

<div id="grid"></div>

<script>
const wsPath = location.pathname.replace(/%2B/gi, '+').replace(/ /g, '+');
const grid = document.getElementById("grid");
let currentIds = '';
let currentCols = 0, currentRows = 0;

function getGridLayout(n) {
  if (n <= 2) return { cols: 1, rows: n };
  return { cols: Math.ceil(n / 2), rows: 2 };
}

function fitClocks() {
  const items = grid.querySelectorAll('.clock');
  if (!items.length) return;
  const n = items.length;
  const { cols, rows } = getGridLayout(n);
  const cellW = window.innerWidth / cols;
  const cellH = window.innerHeight / rows;

  items.forEach(item => {
    const timeEl = item.querySelector('.time');
    const labelEl = item.querySelector('.label');
    const text = timeEl.innerText || '--:--:--:--';
    const charCount = text.length || 11;
    // Monospace char width ~0.62em; leave horizontal padding
    const maxByWidth = (cellW * 0.95) / (charCount * 0.62);
    // Leave room for label (~18% of cell) and vertical padding
    const maxByHeight = cellH * 0.7;
    const fontSize = Math.floor(Math.min(maxByWidth, maxByHeight));
    timeEl.style.fontSize = fontSize + 'px';
  });
}

function buildGrid(clocks) {
  grid.innerHTML = '';
  const n = clocks.length;
  const { cols, rows } = getGridLayout(n);
  currentCols = cols;
  currentRows = rows;
  grid.style.gridTemplateColumns = Array(cols).fill('1fr').join(' ');
  grid.style.gridTemplateRows = Array(rows).fill('1fr').join(' ');

  clocks.forEach(c => {
    const wrapper = document.createElement("div");
    wrapper.className = "clock";
    wrapper.dataset.id = c.id;

    const label = document.createElement("div");
    label.className = "label";

    const ball = document.createElement("span");
    ball.className = "sync-ball" + (c.synced === null ? " hidden" : (c.synced ? " synced" : ""));

    const text = document.createElement("span");
    text.innerText = c.label;

    label.appendChild(ball);
    label.appendChild(text);

    const time = document.createElement("div");
    time.className = "time";
    time.innerText = c.time;

    wrapper.appendChild(label);
    wrapper.appendChild(time);
    grid.appendChild(wrapper);
  });
  fitClocks();
}

window.addEventListener('resize', fitClocks);

let lastCharCounts = '';

function connect() {
  const ws = new WebSocket("ws://" + location.host + wsPath);

  ws.onmessage = (e) => {
    const clocks = JSON.parse(e.data);
    const ids = clocks.map(c => c.id).join(',');

    if (ids !== currentIds) {
      buildGrid(clocks);
      currentIds = ids;
      return;
    }

    clocks.forEach(c => {
      const el = grid.querySelector('[data-id="' + c.id + '"]');
      if (!el) return;
      el.querySelector(".time").innerText = c.time;
      const ball = el.querySelector(".sync-ball");
      if (c.synced === null) {
        ball.className = "sync-ball hidden";
      } else {
        ball.className = c.synced ? "sync-ball synced" : "sync-ball";
      }
    });

    // Refit if character count changed (e.g. frames toggled)
    const charCounts = clocks.map(c => c.time.length).join(',');
    if (charCounts !== lastCharCounts) {
      lastCharCounts = charCounts;
      fitClocks();
    }
  };

  ws.onclose = () => setTimeout(connect, 1000);
}

connect();
</script>
</body>
</html>
