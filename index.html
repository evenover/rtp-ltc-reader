<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LTC</title>
<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:monospace;
  height:100vh;
  overflow:hidden;
}

#grid {
  display:grid;
  gap:2vw;
  height:100vh;
  place-items:center;
}

.clock {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.name {
  font-size:2vw;
  opacity:0.7;
}

.timecode {
  font-size:17vw;
}
</style>
</head>
<body>

<div id="grid"></div>

<script>
const ws = new WebSocket("ws://" + location.host + location.pathname);
const grid = document.getElementById("grid");

ws.onmessage = (e) => {
  const clocks = JSON.parse(e.data);

  if (grid.children.length === 0) {
    grid.style.gridTemplateColumns =
      clocks.length > 1 ? "1fr 1fr" : "1fr";

    clocks.forEach(c => {
      const wrapper = document.createElement("div");
      wrapper.className = "clock";
      wrapper.id = "ch" + c.channel;

      const name = document.createElement("div");
      name.className = "name";
      name.innerText = c.name;

      const tc = document.createElement("div");
      tc.className = "timecode";
      tc.innerText = "--:--:--:--";

      wrapper.appendChild(name);
      wrapper.appendChild(tc);
      grid.appendChild(wrapper);
    });
  }

  clocks.forEach(c => {
    const el = document.querySelector("#ch" + c.channel + " .timecode");
    if (el) el.innerText = c.showframes ? c.tc : c.tc.replace(/:[^:]*$/, '');
  });
};
</script>
</body>
</html>
